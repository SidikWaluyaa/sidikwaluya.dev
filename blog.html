<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Sidik Waluya</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="glass">
        <a href="index.html" class="logo">Sidik.Dev</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#blog">Blog</a></li>
        </ul>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
            <i class="fas fa-moon"></i>
        </button>
    </nav>

    <header class="header-section">
        <div class="container">
            <h1 class="font-xxl mb-1">My Blog</h1>
            <p class="text-muted font-lg">Thoughts, stories and ideas.</p>
        </div>
    </header>

    <section class="container">
        <div id="blog-grid" class="projects-grid">
            <!-- Loaded via JS -->
        </div>
    </section>

    <footer class="p-2 text-center mt-4 border-t">
        <p>&copy; 2026 Sidik Waluya. Built with Google Sheets CMS</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Simplified script for blog page
        const CONFIG = { API_URL: "https://script.google.com/macros/s/AKfycbzQp8WPoF1PjQHGIFZ5SHJ19OKdJNKMXyarGHPWk9xN3BHv3OOrIaWSYISeT_KaK-TK/exec" }; // Set your API URL
        const blogGrid = document.getElementById('blog-grid');
        
        async function loadBlog() {
            let blogs = [];
            if (!CONFIG.API_URL) {
                blogs = [
                    { id: 1, title: "The Future of Web Design", image: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=800", date: "Mar 10, 2026", category: "Design", content: "..." },
                    { id: 2, title: "Mastering Vanilla JavaScript", image: "https://images.unsplash.com/photo-1516259762381-22954d7d3ad2?q=80&w=800", date: "Feb 25, 2026", category: "Dev", content: "..." }
                ];
            } else {
                const res = await fetch(`${CONFIG.API_URL}?route=blog`);
                blogs = await res.json();
            }

            blogGrid.innerHTML = blogs.map(b => `
                <div class="glass overflow-hidden" data-aos="fade-up">
                    <img src="${b.image}" alt="${b.title}" class="w-full h-220 object-cover">
                    <div class="card-content">
                        <span class="text-primary font-sm font-bold">${b.category}</span>
                        <h3 class="mt-1 mb-1">${b.title}</h3>
                        <p class="text-muted font-sm mb-2">${b.date}</p>
                        <a href="blog-detail.html?id=${b.id}" class="btn btn-secondary w-full">Read Article</a>
                    </div>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            AOS.init();
            loadBlog();
            
            // Basic theme toggle
            const themeBtn = document.getElementById('theme-toggle');
            let theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            
            themeBtn.addEventListener('click', () => {
                theme = theme === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
                themeBtn.querySelector('i').className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            });
        });
    </script>
</body>
</html>
